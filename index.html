
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda en Línea</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Mi Tienda</h1>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Productos</a></li>
                <li><a href="#">Carrito</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="productos">
            <div class="producto-caja">
                <img src="1.webp" alt="Producto 1">
                <h2>Producto 1</h2>
                <p>$100.00</p>
                <button>Comprar</button>
            </div>
            
            <div class="producto-caja">
                <img src="2.webp" alt="Producto 2">
                <h2>Producto 2</h2>
                <p>$200.00</p>
                <button>Comprar</button>
            </div>
            
            <div class="producto-caja">
                <img src="3.webp" alt="Producto 3">
                <h2>Producto 3</h2>
                <p>$300.00</p>
                <button>Comprar</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Mi Tienda</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Login Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .modal-blur { backdrop-filter: blur(8px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Navbar -->
    <nav class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.scrollTo({top:0, behavior:'smooth'})">
                <div class="bg-indigo-600 p-1.5 rounded-lg shadow-lg shadow-indigo-100">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <span class="text-xl font-black italic tracking-tighter">TECH<span class="text-indigo-600">STORE</span></span>
            </div>
            
            <div class="flex items-center gap-4">
                <!-- Información de Usuario Logueado -->
                <div id="userInfo" class="hidden flex items-center gap-3">
                    <span id="userNameDisplay" class="text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-full"></span>
                    <button onclick="logout()" class="text-xs font-bold text-red-500 hover:underline">SALIR</button>
                </div>
                <!-- Botón de Entrar -->
                <button id="loginBtn" onclick="openAuthModal()" class="text-sm font-bold text-indigo-600 hover:text-indigo-800">ENTRAR</button>
                
                <!-- Botón de Carrito -->
                <button onclick="toggleCart()" class="relative p-2 text-slate-600 hover:text-indigo-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    <span id="cartCount" class="absolute top-0 right-0 bg-indigo-600 text-white text-[10px] font-bold h-4 w-4 flex items-center justify-center rounded-full hidden">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="max-w-7xl mx-auto px-4 py-12">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-black text-slate-800 mb-2">CATÁLOGO TECH</h1>
            <p class="text-slate-500">Todo lo que necesitas para tu setup profesional.</p>
        </header>

        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Los productos se cargan aquí por JavaScript -->
        </div>
    </main>

    <!-- Modal de Autenticación (Login/Registro) -->
    <div id="authModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 modal-blur" onclick="closeAuthModal()"></div>
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm relative z-10 overflow-hidden animate-fade-in">
            <!-- Pestañas para cambiar entre Login y Registro -->
            <div class="flex border-b">
                <button id="tabLogin" onclick="setAuthMode('login')" class="flex-1 py-4 text-sm font-black border-b-2 border-indigo-600 text-indigo-600">LOGIN</button>
                <button id="tabRegister" onclick="setAuthMode('register')" class="flex-1 py-4 text-sm font-black border-b-2 border-transparent text-slate-400">REGISTRO</button>
            </div>
            
            <div class="p-8">
                <form id="authForm" onsubmit="handleAuth(event)" class="space-y-4">
                    <!-- Campo de Nombre (Oculto por defecto en Login) -->
                    <div id="nameField" class="hidden">
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Nombre Completo</label>
                        <input id="authName" type="text" placeholder="Ej. Juan Pérez" class="w-full p-3 bg-slate-50 rounded-xl border focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Correo Electrónico</label>
                        <input id="authEmail" type="email" placeholder="usuario@correo.com" class="w-full p-3 bg-slate-50 rounded-xl border focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Contraseña</label>
                        <input id="authPass" type="password" placeholder="••••••••" class="w-full p-3 bg-slate-50 rounded-xl border focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
                    </div>
                    <p id="authError" class="text-red-500 text-[11px] font-bold text-center hidden"></p>
                    <button type="submit" id="authSubmitBtn" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all">
                        INICIAR SESIÓN
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Carrito Sidebar -->
    <div id="cartSidebar" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-slate-900/40" onclick="toggleCart()"></div>
        <div class="absolute right-0 top-0 h-full w-80 bg-white shadow-2xl p-6 flex flex-col transform transition-transform">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black">CARRITO</h3>
                <button onclick="toggleCart()" class="text-gray-400 hover:text-red-500">X</button>
            </div>
            
            <div id="cartItems" class="flex-grow space-y-4 overflow-y-auto no-scrollbar italic text-slate-400 text-sm">
                Vacío...
            </div>
            <div class="border-t pt-4 mt-4">
                <div class="flex justify-between font-bold mb-4">
                    <span>Total:</span>
                    <span id="cartTotal">$0.00</span>
                </div>
                <button onclick="checkout()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-indigo-600 transition-colors">Confirmar Pedido</button>
            </div>
        </div>
    </div>

    <!-- Toast de Notificaciones -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-[200] hidden">
        <div class="bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2">
            <span id="toastMsg" class="font-bold text-sm">Mensaje</span>
        </div>
    </div>

    <script>
        let products = [];
        let cart = [];
        let currentUser = JSON.parse(localStorage.getItem('tech_user')) || null;
        let authMode = 'login'; // 'login' o 'register'

        // Inicializar App
        async function init() {
            updateNavUI();
            try {
                const res = await fetch('/api/products');
                if (!res.ok) throw new Error('Servidor no disponible');
                products = await res.json();
            } catch (e) { 
                console.warn("Servidor Node no detectado. Cargando productos de prueba locales."); 
                // Datos de respaldo para que funcione en vistas previas sin el servidor
                products = [
                    { id: 1, name: 'Smartwatch Pro X', price: 159.00, image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=500&q=80', category: 'Wearables' },
                    { id: 2, name: 'Auriculares Noise-Cancelling', price: 299.00, image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=500&q=80', category: 'Audio' },
                    { id: 3, name: 'Teclado Mecánico RGB', price: 89.99, image: 'https://images.unsplash.com/photo-1595225476474-87563907a212?auto=format&fit=crop&w=500&q=80', category: 'Gaming' },
                    { id: 4, name: 'Cámara Mirrorless 4K', price: 850.00, image: 'https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?auto=format&fit=crop&w=500&q=80', category: 'Fotografía' },
                    { id: 5, name: 'Mouse Gamer Inalámbrico', price: 65.00, image: 'https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?auto=format&fit=crop&w=500&q=80', category: 'Periféricos' },
                    { id: 6, name: 'Lámpara de Escritorio LED', price: 45.00, image: 'https://images.unsplash.com/photo-1534073828943-f801091bb18c?auto=format&fit=crop&w=500&q=80', category: 'Oficina' },
                    { id: 7, name: 'Mochila Tech Impermeable', price: 75.00, image: 'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&w=500&q=80', category: 'Accesorios' },
                    { id: 8, name: 'Set de Lentes para Smartphone', price: 35.00, image: 'https://images.unsplash.com/photo-1617033934812-eb79e96536d4?auto=format&fit=crop&w=500&q=80', category: 'Fotografía' }
                ];
            }
            renderProducts();
        }

        // Mostrar Productos en el HTML
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 group">
                    <img src="${p.image}" alt="" class="w-full h-40 object-cover rounded-xl mb-4 group-hover:scale-105 transition-transform">
                    <h3 class="font-bold text-sm text-slate-800 truncate">${p.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="font-black text-indigo-600">$${p.price.toFixed(2)}</span>
                        <button onclick="addToCart(${p.id})" class="bg-slate-50 text-indigo-600 p-2 rounded-lg hover:bg-indigo-600 hover:text-white transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // --- LÓGICA DE AUTENTICACIÓN (LOGIN/REGISTRO) ---
        function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }

        function setAuthMode(mode) {
            authMode = mode;
            const isLogin = mode === 'login';
            
            // Mostrar u ocultar campo de Nombre
            document.getElementById('nameField').classList.toggle('hidden', isLogin);
            
            // Cambiar texto del botón
            document.getElementById('authSubmitBtn').textContent = isLogin ? 'INICIAR SESIÓN' : 'CREAR CUENTA';
            
            // Cambiar estilos de las pestañas activas
            document.getElementById('tabLogin').className = `flex-1 py-4 text-sm font-black border-b-2 ${isLogin ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400'}`;
            document.getElementById('tabRegister').className = `flex-1 py-4 text-sm font-black border-b-2 ${!isLogin ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400'}`;
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPass').value;
            const name = document.getElementById('authName').value;
            const errorEl = document.getElementById('authError');
            errorEl.classList.add('hidden');

            // Determinar si llamamos a /login o a /register
            const url = authMode === 'login' ? '/api/login' : '/api/register';
            const body = authMode === 'login' ? { email, password } : { name, email, password };

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    errorEl.textContent = data.message || "Error en la solicitud";
                    errorEl.classList.remove('hidden');
                    return;
                }

                const data = await res.json();
                currentUser = data.user;
                localStorage.setItem('tech_user', JSON.stringify(currentUser));
                updateNavUI();
                closeAuthModal();
                showToast(authMode === 'login' ? '¡Bienvenido de vuelta!' : '¡Cuenta creada con éxito!');
                
            } catch (err) {
                // FALLBACK LOCAL: Si no hay servidor, permitir uso simulado
                if (authMode === 'login' && email === 'admin@techstore.com' && password === '123456') {
                    currentUser = { id: 1, name: 'Admin Tech', email: 'admin@techstore.com' };
                    localStorage.setItem('tech_user', JSON.stringify(currentUser));
                    updateNavUI();
                    closeAuthModal();
                    showToast('¡Bienvenido (Modo Local)!');
                } else if (authMode === 'register') {
                    currentUser = { id: Date.now(), name: name, email: email };
                    localStorage.setItem('tech_user', JSON.stringify(currentUser));
                    updateNavUI();
                    closeAuthModal();
                    showToast('¡Cuenta creada localmente!');
                } else {
                    errorEl.textContent = "Sin conexión al servidor. Usa admin@techstore.com y 123456 para probar.";
                    errorEl.classList.remove('hidden');
                }
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('tech_user');
            updateNavUI();
            showToast('Sesión cerrada');
        }

        function updateNavUI() {
            const loginBtn = document.getElementById('loginBtn');
            const userInfo = document.getElementById('userInfo');
            const userName = document.getElementById('userNameDisplay');

            if (currentUser) {
                loginBtn.classList.add('hidden');
                userInfo.classList.remove('hidden');
                userName.textContent = currentUser.name.toUpperCase();
            } else {
                loginBtn.classList.remove('hidden');
                userInfo.classList.add('hidden');
            }
        }

        // --- LÓGICA DEL CARRITO ---
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('hidden'); }
        
        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            showToast(`Añadiste ${p.name}`);
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            const countEl = document.getElementById('cartCount');
            const totalEl = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                container.innerHTML = "Tu carrito está vacío...";
                countEl.classList.add('hidden');
                totalEl.textContent = "$0.00";
            } else {
                let total = 0;
                container.innerHTML = cart.map((item, index) => {
                    total += item.price;
                    return `
                    <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg text-slate-800 not-italic">
                        <span class="text-xs font-bold truncate pr-2">${item.name}</span>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-indigo-600 font-bold">$${item.price.toFixed(2)}</span>
                            <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-600 text-xs font-black">X</button>
                        </div>
                    </div>`;
                }).join('');
                
                countEl.textContent = cart.length;
                countEl.classList.remove('hidden');
                totalEl.textContent = `$${total.toFixed(2)}`;
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        // Mostrar Notificación Flotante
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('hidden');
            toast.classList.add('animate-fade-in');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        async function checkout() {
            if (cart.length === 0) return showToast('Añade productos primero');
            if (!currentUser) return openAuthModal();
            
            const total = cart.reduce((acc, item) => acc + item.price, 0);

            try {
                // Enviar la orden al servidor
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.id, items: cart, total: total })
                });

                if (!response.ok) throw new Error("Fallo la petición al servidor");

                alert(`¡Gracias ${currentUser.name}! Compra procesada con éxito por $${total.toFixed(2)}.`);
                cart = [];
                renderCart();
                toggleCart();
            } catch (e) {
                // FALLBACK LOCAL: Simular la compra exitosa si no hay servidor
                alert(`¡Gracias ${currentUser.name}! (Modo Local) Compra procesada con éxito por $${total.toFixed(2)}.`);
                cart = [];
                renderCart();
                toggleCart();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
